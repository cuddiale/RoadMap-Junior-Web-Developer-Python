<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Giorno 3 - Fetch POST</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-card">
        <h2>Crea Nuovo Post</h2>
        <form id="post-form">
            <input type="text" id="title" placeholder="Titolo del post" required>
            <textarea id="body" placeholder="Contenuto..." required></textarea>
            <button type="submit" id="submit-btn">Pubblica Post</button>
        </form>
        <div id="response-msg" class="hidden"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
