<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Data Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            color: #1a73e8;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #1a73e8;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        #btnAdd {
            background-color: #1a73e8;
            color: white;
        }

        #btnAdd:hover {
            background-color: #1557b0;
        }

        .json-output {
            background: #2d2d2d;
            color: #a6e22e;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            width: 100%;
            max-width: 450px;
            overflow-x: auto;
        }

        .json-output span {
            color: #f92672;
        }

        /* Per simulare syntax highlighting */

        ul {
            width: 100%;
            max-width: 450px;
            padding: 0;
            list-style: none;
            margin-top: 20px;
        }

        li {
            background: white;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #1a73e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>📚 Aggiungi Libro</h2>
        <form id="bookForm">
            <div class="form-group">
                <label>Titolo del libro</label>
                <input type="text" id="titolo" placeholder="Es: Il Signore degli Anelli" required>
            </div>
            <div class="form-group">
                <label>Autore</label>
                <input type="text" id="autore" placeholder="Es: J.R.R. Tolkien" required>
            </div>
            <div class="form-group">
                <label>Anno di pubblicazione</label>
                <input type="number" id="anno" placeholder="Es: 1954" required>
            </div>
            <div class="btn-group">
                <button type="submit" id="btnAdd">Genera JSON e Aggiungi</button>
            </div>
        </form>
    </div>

    <div class="json-output" id="jsonDisplay">
        // Qui apparirà la stringa JSON generata...
    </div>

    <ul id="listaLibri"></ul>

    <script>
        const form = document.querySelector("#bookForm");
        const jsonDisplay = document.querySelector("#jsonDisplay");
        const listaLibri = document.querySelector("#listaLibri");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            // 1. CREAZIONE DELL'OGGETTO JAVASCRIPT
            const libroObj = {
                titolo: document.querySelector("#titolo").value,
                autore: document.querySelector("#autore").value,
                anno: document.querySelector("#anno").value,
                id: Date.now() // Generiamo un ID univoco basato sul tempo
            };

            // 2. TRASFORMAZIONE IN JSON (JSON.stringify)
            // Usiamo i parametri extra (null, 2) per rendere il JSON "bello" e leggibile
            const libroJSON = JSON.stringify(libroObj, null, 2);

            // Mostriamo la stringa JSON nel box scuro
            jsonDisplay.innerHTML = `<span>JSON Generato:</span><br>${libroJSON}`;

            // 3. RENDERING DINAMICO NEL DOM
            // Simuliamo di "ricevere" il JSON e lo ritrasformiamo in oggetto per usarlo
            const libroRicevuto = JSON.parse(libroJSON);
            renderizzaLibro(libroRicevuto);

            // 4. RESET DEL FORM (Migliore UX)
            form.reset();
            document.querySelector("#titolo").focus();
        });

        function renderizzaLibro(libro) {
            const li = document.createElement("li");
            li.innerHTML = `
                <div>
                    <strong>${libro.titolo}</strong><br>
                    <small>${libro.autore} (${libro.anno})</small>
                </div>
                <button onclick="this.parentElement.remove()" style="background:none; color:red; border:none; cursor:pointer;">✖</button>
            `;
            listaLibri.appendChild(li);
        }
    </script>
</body>

</html>
