<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottone interattivo</title>
</head>

<body>
    <!DOCTYPE html>

    <head>
        <style>
            /* Questi sono gli stili di base */
            h1 {
                color: red;
                font-size: 32px;
                /* Dimensione standard approssimativa */
                background-color: transparent;
            }

            .contenitore {
                border: 1px solid black;
                padding: 10px;
            }
        </style>
    </head>


    <h1 id="mioTitolo">Testo Originale</h1>

    <button onclick="trasforma()">Modifica!</button>
    <button onclick="original()">Torna Originale</button>

    <script>
        function trasforma() {
            const titolo = document.getElementById("mioTitolo");
            titolo.innerText = "Wow, sono cambiato!";
            titolo.style.color = "blue";
            titolo.style.fontSize = "40px";
            titolo.style.backgroundColor = "yellow";
        }

        function original() {
            const titolo = document.getElementById("mioTitolo");

            // 1. Ripristiniamo il testo
            titolo.innerText = "Testo Originale";

            // 2. Ripristiniamo gli stili
            // Possiamo scrivere i valori originali...
            titolo.style.color = "red";

            // ...oppure possiamo "svuotarli" per far tornare a comandare il CSS!
            titolo.style.fontSize = "";
            titolo.style.backgroundColor = "";
        }
    </script>
</body>

</html>
