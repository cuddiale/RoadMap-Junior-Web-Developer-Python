<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio Alert Dinamico</title>

    <style>
        /* CSS: Diamo un po' di stile alla pagina */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.1s;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Esercizio Alert</h1>
        <p>Clicca il pulsante qui sotto per attivare la funzione JavaScript.</p>

        <button id="alertBtn">Cliccami!</button>
    </div>

    <script>
        // Selezioniamo l'elemento dal DOM
        const bottone = document.getElementById('alertBtn');

        // Aggiungiamo l'ascoltatore di eventi (Event Listener)
        bottone.addEventListener('click', function () {

            // Mostriamo l'alert dinamico
            alert("Hai cliccato il bottone!");

        });
    </script>

</body>

</html>
