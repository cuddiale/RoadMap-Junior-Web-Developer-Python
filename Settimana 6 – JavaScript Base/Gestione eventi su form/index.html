<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Giorno 3 - Eventi JS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="card">
            <h2>Registrazione Squadra</h2>
            <form id="form-squadra">
                <input type="text" id="nome-squadra" placeholder="Inserisci nome..." required>
                <button type="submit">Invia Iscrizione</button>
            </form>
            <p id="messaggio-form">Nessun invio effettuato.</p>
        </div>

        <div class="card">
            <h2>Contatore Click</h2>
            <p>Hai cliccato: <span id="valore-contatore">0</span> volte</p>
            <button id="btn-click">Cliccami!</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
